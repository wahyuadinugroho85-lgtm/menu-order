    <style>
        /* --- GAYA TAMPILAN (CSS) --- */
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; padding: 20px; color: #333; margin: 0; }
        .container { max-width: 700px; background: white; margin: 0 auto 30px auto; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); box-sizing: border-box; }
        h2, h3 { color: #2c3e50; margin-bottom: 20px; text-align: center; }
        
        .logo-wrapper { text-align: center; margin-bottom: 20px; }
        .logo-placeholder { border: 2px dashed #bdc3c7; padding: 15px; border-radius: 6px; cursor: pointer; color: #7f8c8d; max-width: 220px; margin: 0 auto; font-size: 13px; background: #fafafa; }

        .btn-ganti-logo { display: none; font-size: 11px; color: #e67e22; text-decoration: underline; cursor: pointer; margin-top: 5px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .form-group input[type="text"] { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        
        .pesanan-header { display: flex; font-weight: bold; padding-bottom: 10px; border-bottom: 2px solid #ddd; margin-bottom: 10px; font-size: 14px; gap: 10px; }
        .pesanan-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        
        .pesanan-row select, .pesanan-row input[type="text"] { flex: 2; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; height: 42px; background: white; box-sizing: border-box; }
        .pesanan-row input[type="number"] { width: 65px; padding: 10px; text-align: center; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; height: 42px; box-sizing: border-box; }
        
        .btn-tambah { background-color: #27ae60; color: white; padding: 10px 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 20px; width: 100%; }
        .btn-hapus { background-color: #c0392b; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; height: 42px; width: 40px; box-sizing: border-box; }
        .btn-simpan { width: 100%; padding: 14px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; }
        .bg-kasir { background-color: #2980b9; }
        .bg-pelanggan { background-color: #e67e22; }
        
        .rekap-card { background: #fff; padding: 15px; margin-bottom: 15px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 6px solid #f39c12; position: relative; }
        .status-proses { border-left-color: #3498db; }
        .status-selesai { border-left-color: #2ecc71; opacity: 0.7; }
        .rekap-top { display: flex; justify-content: space-between; align-items: center; }
        .rekap-nama { font-weight: bold; font-size: 16px; }
        .rekap-waktu { font-size: 12px; color: #95a5a6; margin-bottom: 10px; }
        .rekap-item { font-family: monospace; font-size: 14px; margin-bottom: 4px; }
        .select-status { padding: 6px; border-radius: 4px; font-weight: bold; border: 1px solid #bdc3c7; }
        .rekap-aksi { margin-top: 15px; display: flex; gap: 10px; border-top: 1px solid #eee; padding-top: 10px; flex-wrap: wrap; }
        .btn-print-item { background-color: #7f8c8d; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-reset-rekap { background-color: #e74c3c; color: white; padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; float: right; font-weight: bold; }

        #areaCetak { display: none; }

        /* FORMAT STRUK KASIR THERMAL 58MM */
        @media print {
            body > * { display: none !important; } 
            #areaCetak { display: block !important; width: 58mm; padding: 2mm 3mm 4mm 3mm; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; font-size: 11px; line-height: 1.3; color: #000; }
            @page { size: 58mm auto; margin: 0; }
            .struk-logo { display: block; max-width: 22mm; margin: 0 auto 6px auto; }
            .struk-title { text-align: center; font-weight: bold; font-size: 12px; margin-bottom: 5px; text-transform: uppercase; border-bottom: 1px dashed #000; padding-bottom: 3px; }
            .struk-meta { font-size: 10px; margin-bottom: 2px; }
            .struk-divider { border-top: 1px dashed #000; margin: 5px 0; }
            .struk-items { font-size: 11px; font-weight: bold; }
            .struk-footer { text-align: center; font-size: 9px; margin-top: 8px; padding-top: 4px; border-top: 1px dashed #000; }
        }
    </style>
</head>
<body>

<script>

  };

  firebase.initializeApp(firebaseConfig);

  // Waktu buka halaman (digunakan agar pesanan lama tidak memicu suara saat baru refresh)
  let batasWaktuNotifikasi = Date.now();
</script>

<!-- TAMPILAN SISI LAPTOP KASIR UTAMA      -->

<div id="viewKasir" style="display: none;">
    
    <!-- PANEL MANAGEMEN DAFTAR MENU (KASIR ONLY) -->
    <div class="container" style="border-top: 6px solid #9b59b6;">
        <h3>⚙️ Kelola Pilihan Menu Kuliner</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input type="text" id="inputMenuBaru" placeholder="Ketik nama menu baru... (Contoh: Kopi Hitam)" style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px;">
            <button onclick="tambahMenuKeCloud()" style="background-color: #9b59b6; color: white; padding: 10px 18px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">+ Tambah Menu</button>
        </div>
        <div id="daftarMenuKasir" style="max-height: 180px; overflow-y: auto; border: 1px solid #eee; padding: 10px; border-radius: 6px; background: #fafafa;">

        </div>

    <div class="container">
        <div class="logo-wrapper">
            <input type="file" id="inputFileLogo" accept="image/*" style="display: none;" onchange="prosesKunciLogo(this)">

                📂 Klik di sini untuk mengunci<br><b>Logo Best</b> Anda
            </div>
            <img id="gambarLogoApp" src="" alt="Logo" class="app-logo" onclick="bukaPilihFile()" title="Ganti Logo">
            <div id="teksGantiLogo" class="btn-ganti-logo" onclick="bukaPilihFile()">Ganti Logo</div>

        <h2 id="judulForm">Catat Pesanan Manual</h2>

        <div class="pesanan-header">
            <div style="flex: 2;">Menu Utama</div>
            <div style="flex: 2;">Varian / Catatan <span style="color:red;">*Wajib</span></div>
            <div style="width: 65px; text-align: center;">Jumlah</div>

        </div>
        
        <!-- Baris dinamis -->
        <div id="daftarPesanan"></div>
        
        <button class="btn-tambah" onclick="tambahBaris('daftarPesanan')">+ Tambah Item</button>
        <button class="btn-simpan bg-kasir" id="btnSimpanUtama" onclick="simpanPesananManual()">Simpan Ke Rekapitulasi</button>
    </div>

    <div class="container">
        <button class="btn-reset-rekap" onclick="hapusSemuaRekap()">Hapus Semua Rekap</button>
        <h3>Rekapitulasi Antrean Pesanan (Real-Time)</h3>
        <hr style="border: 0; border-top: 1px solid #ddd; margin: 15px 0;">
        <div id="areaRekap"></div>

<div id="viewPelanggan" style="display: none;">
    <div class="container">
        <div style="text-align: center; margin-bottom: 15px;">
            <img id="logoPelanggan" src="" alt="Logo" style="max-width: 100px; display: none;">
        </div>

        <div class="form-group">
            <label for="namaPelanggan">Nama Anda:</label>

        <div class="pesanan-header">
            <div style="flex: 2;">Pilih Menu</div>
            <div style="flex: 2;">Varian / Request <span style="color:red;">*Wajib</span></div>

            <div style="width: 40px;"></div>

        <!-- Baris pelanggan -->
        <div id="daftarPesananPelanggan"></div>
        
        <button class="btn-tambah" onclick="tambahBaris('daftarPesananPelanggan')">+ Tambah Menu Lain</button>
        <button class="btn-simpan bg-pelanggan" id="btnKirimPelanggan" onclick="kirimPesananFirebase()">🚀 Kirim Pesanan Langsung ke Kasir</button>
    </div>

<!-- KOTAK TERSEMBUNYI UNTUK PRINT -->
<div id="areaCetak"></div>


<!-- LOGIKAL PEMROGRAMAN JAVASCRIPT -->
<script>
    let idPesananSedangDiedit = null;
    let localOrdersCache = [];
    let daftarMenuGlobal = []; 

    window.onload = function() {
        // 1. Sinkronisasi logo warung via cloud
        db.ref('settings/logo').on('value', function(snapshot) {
            const logoSrc = snapshot.val();
            if (logoSrc) {
                document.getElementById('kotakUpload').style.display = 'none';
                document.getElementById('gambarLogoApp').src = logoSrc;
                document.getElementById('gambarLogoApp').style.display = 'block';
                document.getElementById('teksGantiLogo').style.display = 'block';
                document.getElementById('logoPelanggan').src = logoSrc;
                document.getElementById('logoPelanggan').style.display = 'inline-block';
            }
        });

        // 2. Sinkronisasi Data Menu Kuliner dari cloud secara Real-time
        db.ref('menus').on('value', function(snapshot) {
            daftarMenuGlobal = [];
            snapshot.forEach(child => {
                daftarMenuGlobal.push({ id: child.key, nama: child.val().nama });
            });

            renderManajemenMenuKasir();

            // Memperbarui opsi pilihan dropdown aktif
            const semuaSelects = document.querySelectorAll('.input-menu, .input-menu-pelanggan');
            semuaSelects.forEach(select => {
                const nilaiSebelumnya = select.value;
                select.innerHTML = '<option value="">-- Pilih Menu --</option>';
                daftarMenuGlobal.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.nama; opt.innerText = m.nama;
                    if(m.nama === nilaiSebelumnya) opt.selected = true;
                    select.appendChild(opt);
                });
            });

            if(document.getElementById('daftarPesanan').children.length === 0) {
                tambahBaris('daftarPesanan');
            }
            if(document.getElementById('daftarPesananPelanggan').children.length === 0) {
                tambahBaris('daftarPesananPelanggan');
            }
        });
        
        // Cek mode link (?mode=pelanggan)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'pelanggan') {
            document.getElementById('viewKasir').style.display = 'none';
            document.getElementById('viewPelanggan').style.display = 'block';
        } else {
            document.getElementById('viewPelanggan').style.display = 'none';
            document.getElementById('viewKasir').style.display = 'block';
            dengarkanPesananMasuk();
        }
    };

    // --- FITUR NOTIFIKASI SUARA (Ting-Tung Elektronik) ---
    function bunyikanNotifikasiMasuk() {
        try {
            let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Nada Pertama (Ting)
            let osc1 = audioCtx.createOscillator();
            let gain1 = audioCtx.createGain();
            osc1.connect(gain1); gain1.connect(audioCtx.destination);
            osc1.type = 'sine'; osc1.frequency.setValueAtTime(587.33, audioCtx.currentTime); // Nada D5
            gain1.gain.setValueAtTime(0.12, audioCtx.currentTime);
            osc1.start(); osc1.stop(audioCtx.currentTime + 0.15);
            
            // Nada Kedua (Tung)
            setTimeout(() => {
                let osc2 = audioCtx.createOscillator();
                let gain2 = audioCtx.createGain();
                osc2.connect(gain2); gain2.connect(audioCtx.destination);
                osc2.type = 'sine'; osc2.frequency.setValueAtTime(880, audioCtx.currentTime); // Nada A5
                gain2.gain.setValueAtTime(0.12, audioCtx.currentTime);
                osc2.start(); osc2.stop(audioCtx.currentTime + 0.3);
            }, 140);
        } catch (e) { console.log("Notifikasi suara tertahan keamanan browser:", e); }
    }

    // --- LOGIK MANAJEMEN MENU DI KASIR ---
    function tambahMenuKeCloud() {
        const namaMenu = document.getElementById('inputMenuBaru').value.trim();
        if(!namaMenu) { alert('Ketik nama menu terlebih dahulu!'); return; }
        
        const cekDuplikat = daftarMenuGlobal.some(m => m.nama.toLowerCase() === namaMenu.toLowerCase());
        if(cekDuplikat) { alert('Nama menu tersebut sudah terdaftar!'); return; }

        db.ref('menus').push({ nama: namaMenu });
        document.getElementById('inputMenuBaru').value = '';
    }

    function hapusMenuDariCloud(idMenu) {
        if(confirm('Hapus menu ini dari daftar pilihan?')) {
            db.ref('menus/' + idMenu).remove();
        }
    }

    function renderManajemenMenuKasir() {
        const areaContainer = document.getElementById('daftarMenuKasir');
        if(!areaContainer) return;
        areaContainer.innerHTML = '';

        if(daftarMenuGlobal.length === 0) {
            areaContainer.innerHTML = '<p style="color:#95a5a6; text-align:center; margin:5px 0 0 0; font-size:13px;">Belum ada menu kuliner. Silakan tambah di atas.</p>';
            return;
        }

        daftarMenuGlobal.forEach(m => {
            const itemBox = document.createElement('div');
            itemBox.style = 'display:flex; justify-content:space-between; align-items:center; padding:6px 10px; background:white; margin-bottom:5px; border-radius:4px; border:1px solid #ddd; font-size:14px;';
            itemBox.innerHTML = `<span><b>${m.nama}</b></span>
                <button onclick="hapusMenuDariCloud('${m.id}')" style="background:#e74c3c; color:white; border:none; padding:3px 8px; border-radius:4px; cursor:pointer; font-weight:bold; font-size:11px;">Hapus</button>`;
            areaContainer.appendChild(itemBox);
        });
    }

    // --- LOGIK KUNCI LOGO ---
    function bukaPilihFile() { document.getElementById('inputFileLogo').click(); }
    function prosesKunciLogo(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) { db.ref('settings/logo').set(e.target.result); };
            reader.readAsDataURL(file);
        }
    }

    // --- LOGIK BARIS PESANAN DINAMIS ---
    function tambahBaris(targetContainerId) {
        const container = document.getElementById(targetContainerId);
        const row = document.createElement('div');
        row.className = 'pesanan-row';
        
        let kelasMenu = targetContainerId === 'daftarPesanan' ? 'input-menu' : 'input-menu-pelanggan';
        let kelasVarian = targetContainerId === 'daftarPesanan' ? 'input-varian' : 'input-varian-pelanggan';
        let kelasQty = targetContainerId === 'daftarPesanan' ? 'input-qty' : 'input-qty-pelanggan';
        
        let opsiMenuHTML = '<option value="">-- Pilih Menu --</option>';
        daftarMenuGlobal.forEach(m => {
            opsiMenuHTML += `<option value="${m.nama}">${m.nama}</option>`;
        });

        row.innerHTML = `
            <select class="${kelasMenu}">${opsiMenuHTML}</select>
            <input type="text" class="${kelasVarian}" placeholder="Misal: Pahit, Manis, Es, Panas">
            <input type="number" class="${kelasQty}" value="1" min="1">
            <button class="btn-hapus" onclick="hapusBaris(this)">X</button>
        `;
        container.appendChild(row);
    }

    function hapusBaris(button) {
        const container = button.parentNode.parentNode;
        if (container.children.length > 1) button.parentNode.remove();
        else alert('Minimal harus mengisi satu item menu!');
    }

    // Simpan data dari kasir secara manual
    function simpanPesananManual() {
        const nama = document.getElementById('namaPemesan').value.trim();
        if (!nama) { alert('Mohon isi nama pemesan!'); return; }
        
        const rows = document.querySelectorAll('#daftarPesanan .pesanan-row');
        let items = [];
        let adaVarianKosong = false;

        rows.forEach(row => {
            const menu = row.querySelector('.input-menu').value;
            const varian = row.querySelector('.input-varian').value.trim();
            const qty = row.querySelector('.input-qty').value;
            if (menu !== '') {
                if (varian === '') { adaVarianKosong = true; }
                items.push({ menu: menu, varian: varian, qty: qty });
            }
        });

        if (items.length === 0) { alert('Mohon pilih menu minimal satu item!'); return; }
        if (adaVarianKosong) { alert('⚠️ Gagal Menyimpan! Kolom Varian / Catatan tidak boleh kosong. Isikan selera rasa atau ketik "Original" jika tidak ada request.'); return; }
        
        if (idPesananSedangDiedit !== null) {
            db.ref('orders/' + idPesananSedangDiedit).update({ pemesan: nama, listMenu: items });
            idPesananSedangDiedit = null;
            document.getElementById('btnSimpanUtama').innerText = 'Simpan Ke Rekapitulasi';
            document.getElementById('judulForm').innerText = 'Catat Pesanan Manual';
        } else {
            const newRef = db.ref('orders').push();
            newRef.set({
                id: newRef.key, pemesan: nama,
                waktu: new Date().toLocaleString('id-ID', { hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short' }),
                listMenu: items, status: 'Diterima', timestamp: Date.now()
            });
        }
        document.getElementById('namaPemesan').value = '';
        document.getElementById('daftarPesanan').innerHTML = '';
        tambahBaris('daftarPesanan');
    }

    // Pengiriman pesanan dari HP Pelanggan
    function kirimPesananFirebase() {
        const nama = document.getElementById('namaPelanggan').value.trim();
        if (!nama) { alert('Mohon masukkan nama Anda terlebih dahulu!'); return; }
        
        const rows = document.querySelectorAll('#daftarPesananPelanggan .pesanan-row');
        let items = [];
        let adaVarianKosong = false;

        rows.forEach(row => {
            const menu = row.querySelector('.input-menu-pelanggan').value;
            const varian = row.querySelector('.input-varian-pelanggan').value.trim();
            const qty = row.querySelector('.input-qty-pelanggan').value;
            if (menu !== '') {
                if (varian === '') { adaVarianKosong = true; }
                items.push({ menu: menu, varian: varian, qty: qty });
            }
        });

        if (items.length === 0) { alert('Mohon tentukan menu pilihan Anda!'); return; }
        if (adaVarianKosong) { alert('⚠️ Gagal Mengirim! Pilihan Varian / Catatan wajib diisi. Silakan tulis keinginan Anda (Contoh: Es / Panas / Manis / Original).'); return; }

        const btn = document.getElementById('btnKirimPelanggan');
        btn.disabled = true; btn.innerText = "Mengirim...";

        const newRef = db.ref('orders').push();
        newRef.set({
            id: newRef.key, pemesan: nama,
            waktu: new Date().toLocaleString('id-ID', { hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short' }),
            listMenu: items, status: 'Diterima', timestamp: Date.now()
        }).then(() => {
            alert('🚀 Pesanan Anda Sukses Terkirim! Silakan tunggu panggilan dari kasir.');
            btn.disabled = false; btn.innerText = "🚀 Kirim Pesanan Langsung ke Kasir";
            document.getElementById('namaPelanggan').value = '';
            document.getElementById('daftarPesananPelanggan').innerHTML = '';
            tambahBaris('daftarPesananPelanggan');
        }).catch((err) => {
            alert('Gagal mengirim pesanan.');
            btn.disabled = false; btn.innerText = "🚀 Kirim Pesanan Langsung ke Kasir";
        });
    }

    // Pemantauan real-time antrean pesanan di kasir
    function dengarkanPesananMasuk() {
        db.ref('orders').orderByChild('timestamp').on('value', function(snapshot) {
            const area = document.getElementById('areaRekap');
            area.innerHTML = '';
            localOrdersCache = [];
            
            let rekapArr = [];
            let pemicuSuaraSuaraBaru = false;

            snapshot.forEach(child => { 
                let orderData = child.val();
                rekapArr.push(orderData); 
                
                // Cek jika ada pesanan baru yang masuk setelah halaman ini dibuka
                if (orderData.timestamp > batasWaktuNotifikasi) {
                    pemicuSuaraSuaraBaru = true;
                    batasWaktuNotifikasi = orderData.timestamp; // Perbarui batas waktu teratas
                }
            });
            
            if (pemicuSuaraSuaraBaru) {
                bunyikanNotifikasiMasuk();
            }

            rekapArr.reverse(); 
            localOrdersCache = rekapArr;

            if (rekapArr.length === 0) { area.innerHTML = '<p style="color:#7f8c8d; text-align:center;">Belum ada antrean pesanan.</p>'; return; }
            
            let html = '';
            rekapArr.forEach(p => {
                let classStat = p.status === 'Sedang Proses' ? 'status-proses' : (p.status === 'Selesai' ? 'status-selesai' : '');
                html += `<div class="rekap-card ${classStat}">
                    <div class="rekap-top">
                        <div class="rekap-nama">${p.pemesan}</div>
                        <select class="select-status" onchange="ubahStatus('${p.id}', this.value)">
                            <option value="Diterima" ${p.status==='Diterima'?'selected':''}>⏳ Diterima</option>
                            <option value="Sedang Proses" ${p.status==='Sedang Proses'?'selected':''}>🔥 Proses</option>
                            <option value="Selesai" ${p.status==='Selesai'?'selected':''}>✅ Selesai</option>
                        </select>
                    </div>
                    <div class="rekap-waktu">Order: ${p.waktu}</div>`;
                p.listMenu.forEach(m => { 
                    let infoVarian = m.varian ? ` <span style="color:#d35400; font-weight:bold;">[${m.varian}]</span>` : '';
                    html += `<div class="rekap-item">• ${m.menu}${infoVarian} (${m.qty}x)</div>`; 
                });
                html += `<div class="rekap-aksi">
                    <button style="background-color:#e67e22; color:white; border:none; padding:6px 12px; border-radius:4px; font-weight:bold; cursor:pointer;" onclick="pemicuEdit('${p.id}')">✏️ Edit</button>
                    <button class="btn-print-item" onclick="cetakStrukKasir('${p.id}')">🖨️ Print Struk</button>
                    <button style="background-color:#e74c3c; color:white; border:none; padding:6px 12px; border-radius:4px; font-weight:bold; cursor:pointer;" onclick="hapusPesananTunggal('${p.id}')">🗑️ Hapus</button>
                </div></div>`;
            });
            area.innerHTML = html;
        });
    }

    function ubahStatus(id, stat) { db.ref('orders/' + id).update({ status: stat }); }

    // Menghapus satu kartu pesanan tertentu dari rekap antrean kasir
    function hapusPesananTunggal(id) {
        if (confirm('Apakah Anda yakin ingin menghapus permanen pesanan ini dari antrean?')) {
            db.ref('orders/' + id).remove();
        }
    }

    // Membuka mode edit pesanan manual di kasir
    function pemicuEdit(id) {
        let p = localOrdersCache.find(item => item.id === id);
        if(!p) return;
        idPesananSedangDiedit = id;
        document.getElementById('namaPemesan').value = p.pemesan;
        const container = document.getElementById('daftarPesanan');
        container.innerHTML = '';
        
        p.listMenu.forEach(m => {
            const row = document.createElement('div');
            row.className = 'pesanan-row';
            
            let opsiMenuHTML = '<option value="">-- Pilih Menu --</option>';
            let menuMasihAktif = daftarMenuGlobal.some(menuItem => menuItem.nama === m.menu);
            if(!menuMasihAktif && m.menu) {
                opsiMenuHTML += `<option value="${m.menu}" selected>${m.menu} (Menu Lama)</option>`;
            }
            daftarMenuGlobal.forEach(menuItem => {
                let selected = menuItem.nama === m.menu ? 'selected' : '';
                opsiMenuHTML += `<option value="${menuItem.nama}" ${selected}>${menuItem.nama}</option>`;
            });

            row.innerHTML = `
                <select class="input-menu">${opsiMenuHTML}</select>
                <input type="text" class="input-varian" value="${m.varian || ''}" placeholder="Misal: Pahit, Manis, Es, Panas">
                <input type="number" class="input-qty" value="${m.qty}">
                <button class="btn-hapus" onclick="hapusBaris(this)">X</button>
            `;
            container.appendChild(row);
        });
        document.getElementById('btnSimpanUtama').innerText = 'Simpan Perubahan';
        document.getElementById('judulForm').innerText = '✏️ Edit Mode';
        window.scrollTo({top:0, behavior:'smooth'});
    }

    function cetakStrukKasir(id) {
        let p = localOrdersCache.find(item => item.id === id);
        if(!p) return;
        
        const logoSrc = document.getElementById('gambarLogoApp').src;
        let imgTag = document.getElementById('gambarLogoApp').style.display === 'block' ? `<img src="${logoSrc}" class="struk-logo">` : '';
        
        let htmlStruk = `${imgTag}
            <div class="struk-title">PESANAN MASUK</div>
            <div class="struk-meta">Pelanggan: ${p.pemesan}</div>
            <div class="struk-meta">Waktu    : ${p.waktu}</div>
            <div class="struk-divider"></div>
            <div class="struk-items">`;
        p.listMenu.forEach(m => { 
            let cetakVarian = m.varian ? `<br><span style="font-size:9px; font-weight:normal; padding-left:8px;">* Selera: ${m.varian}</span>` : '';
            htmlStruk += `<div style="margin-bottom:5px;"><div style="display:flex; justify-content:space-between;"><span>- ${m.menu}</span><span>x${m.qty}</span></div>${cetakVarian}</div>`; 
        });
        htmlStruk += `</div><div class="struk-footer">Status: ${p.status}<br>* TERIMA KASIH *</div>`;
        document.getElementById('areaCetak').innerHTML = htmlStruk;
        window.print();
    }

    function hapusSemuaRekap() { if(confirm('Hapus seluruh rekapan dari database cloud?')) db.ref('orders').remove(); }
</script>

</body>
